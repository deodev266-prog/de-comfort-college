<!DOCTYPE html>
<html>
<head>
  <title>My Anime.js Website</title>

  <style>
    .box{
      width:100px;
      height:100px;
      background:red;
    }
  </style>
</head>

<body>

<div class="box"></div>

<!-- Anime.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<script>
anime({
  targets: '.box',
  translateX: 250,
  rotate: '1turn',
  duration: 2000
});
</script>

</body>
</html>
